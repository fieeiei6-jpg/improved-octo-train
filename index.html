<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Website</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}


/* Fiw */
header{
    background:linear-gradient(135deg,#0066ff,#00ccff);
    padding:60px 20px;
}


header h1{
    font-size:50px;
}


main{
    padding:50px 20px;
}


.card{

    background:#222;
    max-width:500px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px #00ffff;

}


button{

    margin-top:20px;
    padding:15px 40px;
    border:none;
    border-radius:30px;
    background:#00ff99;
    font-size:18px;
    cursor:pointer;

}


button:hover{

    background:yellow;

}


footer{

    margin-top:50px;
    padding:20px;
    background:#222;

}

</style>


</head>


<body>


<header>

<h1>เว็บไซต์ของฉัน</h1>

<p>สร้างด้วย VS Code + GitHub</p>

</header>



<main>


<div class="card">


<h2>Welcome 🚀</h2>

<p>
นี่คือเว็บไซต์ตัวอย่าง
HTML + CSS + JavaScript
</p>


<button onclick="hello()">

กดปุ่ม

</button>


</div>


</main>



<footer>

© 2026 My Website

</footer>



<script>


function hello(){

alert("สวัสดี! เว็บทำงานแล้ว 🎉");

}


</script>


</body>

</html>
